<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap');
    body { font-family: 'Outfit', sans-serif; background: #0A0A0A; color: #FFFFFF; width: 340px; }
    .neon-border { position: relative; }
    .neon-border::after { content: ''; position: absolute; inset: -1px; background: linear-gradient(45deg, #7c3aed, #06b6d4, #7c3aed); border-radius: inherit; z-index: -1; opacity: 0.3; }
    .glow-cyan:hover { box-shadow: 0 0 15px rgba(6, 182, 212, 0.4); }
    .hide-scrollbar::-webkit-scrollbar { display: none; }
  </style>
</head>
<body class="p-4 flex flex-col gap-6 h-[550px]">
  <div class="flex items-center justify-between">
    <div class="flex items-center gap-2">
      <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-violet-600 to-cyan-500 flex items-center justify-center font-black text-xs">G</div>
      <h1 class="text-lg font-extrabold tracking-tight">GRIDXD <span class="text-[10px] text-cyan-400 font-bold ml-1 uppercase">v2</span></h1>
    </div>
    <button id="cancel" class="text-zinc-500 hover:text-white transition-colors">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
    </button>
  </div>

  <!-- TABS -->
  <div class="flex gap-1 p-1 bg-zinc-900/80 rounded-xl border border-white/5">
    <button id="tab-extract" class="flex-1 py-1.5 text-xs font-bold rounded-lg transition-all bg-white/10 text-white">EXTRAER</button>
    <button id="tab-generate" class="flex-1 py-1.5 text-xs font-bold rounded-lg transition-all text-zinc-500 hover:text-white">GENERAR</button>
  </div>

  <!-- EXTRACT CONTENT -->
  <div id="content-extract" class="flex flex-col gap-4 animate-in fade-in duration-300">
    <div class="bg-zinc-900/50 border border-white/5 rounded-2xl p-4 space-y-3">
      <div class="flex items-center gap-2">
        <div class="w-2 h-2 rounded-full bg-cyan-500 animate-pulse"></div>
        <p class="text-[10px] font-bold text-zinc-400 uppercase tracking-widest">Procedimiento</p>
      </div>
      <p class="text-xs text-zinc-300 leading-relaxed font-medium">1. Selecciona un Frame con iconos.<br>2. Detectaremos y vectorizaremos cada activo automáticamente.</p>
    </div>

    <div class="space-y-2">
      <div class="flex items-center justify-between px-1">
        <label class="text-[9px] font-bold text-zinc-500 uppercase tracking-widest">Opciones de Motor</label>
        <span class="text-[9px] text-cyan-400 font-bold">UHD + VECTOR</span>
      </div>
      <div class="grid grid-cols-2 gap-2">
        <div class="flex items-center gap-2 bg-zinc-900/80 border border-white/5 p-2 rounded-xl">
          <input type="checkbox" id="remove-bg" checked class="accent-cyan-500 w-3 h-3">
          <label for="remove-bg" class="text-[10px] font-bold text-zinc-300">Limiar Fondo</label>
        </div>
        <div class="flex items-center gap-2 bg-zinc-900/80 border border-white/5 p-2 rounded-xl">
          <input type="checkbox" id="vectorize" checked class="accent-violet-500 w-3 h-3">
          <label for="vectorize" class="text-[10px] font-bold text-zinc-300">Vectorizar</label>
        </div>
      </div>
    </div>

    <button id="extract" class="w-full py-4 bg-gradient-to-r from-violet-600 to-cyan-600 rounded-2xl font-black text-sm tracking-wide shadow-lg shadow-violet-500/20 hover:scale-[1.02] transition-all glow-cyan flex items-center justify-center gap-2 group">
      <span class="group-hover:rotate-12 transition-transform">✨</span>
      DETECTAR Y EXTRAER
    </button>
  </div>

  <!-- GENERATE CONTENT (Hidden by default) -->
  <div id="content-generate" class="hidden flex flex-col gap-4 animate-in slide-in-from-right-4 duration-300">
    <div class="space-y-4">
      <div class="space-y-2">
        <label class="text-[9px] font-bold text-zinc-500 uppercase tracking-widest px-1">Prompt de Icono</label>
        <input id="prompt" type="text" placeholder="Ej: Rocket, User settings, Cloud sync..." class="w-full bg-zinc-900 border border-white/10 rounded-xl p-3 text-xs focus:ring-2 focus:ring-violet-500 outline-none font-bold placeholder:text-zinc-600">
      </div>

      <div class="space-y-2">
        <label class="text-[9px] font-bold text-zinc-500 uppercase tracking-widest px-1">Estilo Visual (DNA)</label>
        <div class="grid grid-cols-3 gap-2">
          <button class="style-btn active py-3 bg-white/10 border border-violet-500/50 rounded-xl flex flex-col items-center gap-1" data-style="outline">
            <span class="text-xl">○</span>
            <span class="text-[8px] font-bold uppercase">Outline</span>
          </button>
          <button class="style-btn py-3 bg-zinc-900 border border-white/5 rounded-xl flex flex-col items-center gap-1" data-style="filled">
            <span class="text-xl">●</span>
            <span class="text-[8px] font-bold uppercase">Filled</span>
          </button>
          <button class="style-btn py-3 bg-zinc-900 border border-white/5 rounded-xl flex flex-col items-center gap-1" data-style="duotone">
            <span class="text-xl">◑</span>
            <span class="text-[8px] font-bold uppercase">Duotone</span>
          </button>
        </div>
      </div>

      <button id="generate" class="w-full py-4 bg-zinc-100 text-black rounded-2xl font-black text-sm tracking-wide hover:bg-white transition-all flex items-center justify-center gap-2">
        Inyectar en Figma
      </button>
    </div>
  </div>

  <div id="loader" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex flex-col items-center justify-center gap-4">
    <div class="w-12 h-12 border-4 border-violet-500/20 border-t-violet-500 rounded-full animate-spin"></div>
    <p class="text-xs font-bold text-white tracking-widest uppercase animate-pulse">Procesando con GRIDXD Cloud...</p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/imagetracerjs@1.2.6/imagetracer_v1.2.6.js"></script>
  <script>
    const API_BASE = "https://gridxd-main-production.up.railway.app";
    let activeStyle = "outline";

    // Tabs logic
    const tabExtract = document.getElementById('tab-extract');
    const tabGenerate = document.getElementById('tab-generate');
    const contentExtract = document.getElementById('content-extract');
    const contentGenerate = document.getElementById('content-generate');

    tabExtract.onclick = () => {
      tabExtract.classList.add('bg-white/10', 'text-white');
      tabExtract.classList.remove('text-zinc-500');
      tabGenerate.classList.remove('bg-white/10', 'text-white');
      tabGenerate.classList.add('text-zinc-500');
      contentExtract.classList.remove('hidden');
      contentGenerate.classList.add('hidden');
    };

    tabGenerate.onclick = () => {
      tabGenerate.classList.add('bg-white/10', 'text-white');
      tabGenerate.classList.remove('text-zinc-500');
      tabExtract.classList.remove('bg-white/10', 'text-white');
      tabExtract.classList.add('text-zinc-500');
      contentGenerate.classList.remove('hidden');
      contentExtract.classList.add('hidden');
    };

    // Style selection
    const styleBtns = document.querySelectorAll('.style-btn');
    styleBtns.forEach(btn => {
      btn.onclick = () => {
        styleBtns.forEach(b => b.classList.remove('bg-white/10', 'border-violet-500/50', 'active'));
        styleBtns.forEach(b => b.classList.add('bg-zinc-900', 'border-white/5'));
        btn.classList.add('bg-white/10', 'border-violet-500/50', 'active');
        btn.classList.remove('bg-zinc-900', 'border-white/5');
        activeStyle = btn.getAttribute('data-style');
      };
    });

    document.getElementById('cancel').onclick = () => {
      parent.postMessage({ pluginMessage: { type: 'cancel' } }, '*');
    };

    document.getElementById('extract').onclick = () => {
      document.getElementById('loader').classList.remove('hidden');
      parent.postMessage({ pluginMessage: { type: 'extract-icons' } }, '*');
    };

    document.getElementById('generate').onclick = async () => {
      const prompt = document.getElementById('prompt').value;
      if (!prompt) return;

      document.getElementById('loader').classList.remove('hidden');

      try {
        // Mock DNA or extract from selection if needed
        const dna = { style: activeStyle, color_primary: "#7c3aed" };
        
        const formData = new FormData();
        formData.append('icon_name', prompt);
        formData.append('dna', JSON.stringify(dna));
        formData.append('variant', activeStyle);

        const response = await fetch(`${API_BASE}/generate-icon`, {
          method: 'POST',
          body: formData,
        });

        const data = await response.json();
        if (data.svg) {
          parent.postMessage({ pluginMessage: { type: 'insert-svg', svg: data.svg, name: prompt } }, '*');
        }
      } catch (e) {
        console.error(e);
      } finally {
        document.getElementById('loader').classList.add('hidden');
      }
    };

    onmessage = async (event) => {
      const msg = event.data.pluginMessage;
      
      if (msg.type === 'upload-image') {
        const bytes = new Uint8Array(msg.bytes);
        const file = new File([bytes], 'figma_capture.png', { type: 'image/png' });

        const formData = new FormData();
        formData.append('image', file);
        formData.append('remove_background', document.getElementById('remove-bg').checked);
        formData.append('upscale', 'true');

        try {
          const response = await fetch(`${API_BASE}/process-image`, {
            method: 'POST',
            body: formData,
          });

          if (!response.ok) throw new Error("API Fatal");

          const data = await response.json();
          const icons = [];

          const shouldVectorize = document.getElementById('vectorize').checked;

          for (const imgInfo of data.images) {
            const imgUrl = `${API_BASE}${imgInfo.url}`;
            const imgResp = await fetch(imgUrl);
            const blob = await imgResp.blob();
            
            // Convert blob to base64 for figma
            const reader = new FileReader();
            const base64Promise = new Promise(resolve => {
              reader.onloadend = () => resolve(reader.result);
              reader.readAsDataURL(blob);
            });
            const base64 = await base64Promise;

            let svgContent = null;
            if (shouldVectorize) {
              // Convert to SVG using client-side ImageTracer
              try {
                const img = new Image();
                img.src = base64;
                await new Promise(r => img.onload = r);
                
                const canvas = document.createElement('canvas');
                canvas.width = img.width;
                canvas.height = img.height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0);
                
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                svgContent = ImageTracer.getSVGString(imageData, { 
                  ltres: 0.1, qtres: 1, pathomit: 8, 
                  colorsampling: 1, numberofcolors: 2 
                });
              } catch (err) {
                console.error("Vectorization failed:", err);
              }
            }

            icons.push({
              image: base64,
              svg: svgContent,
              name: imgInfo.name
            });
          }

          parent.postMessage({ pluginMessage: { type: 'extraction-success', icons } }, '*');
        } catch (error) {
          console.error(error);
          parent.postMessage({ pluginMessage: { type: 'extraction-fail' } }, '*');
        } finally {
          document.getElementById('loader').classList.add('hidden');
        }
      }
    };
  </script>
</body>
</html>
